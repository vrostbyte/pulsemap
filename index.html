<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PulseMap — Community health intelligence dashboard. Wastewater surveillance, air quality, flu activity, and outbreak alerts in one view." />
    <title>PulseMap — Community Health Intelligence</title>

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- MapLibre GL CSS (required for map controls and popups to render) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
    />

    <style>
      /* ── Reset + dark base ─────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-bg: #0a0f1a;
        --color-panel: #0d1321;
        --color-border: #1e2d4a;
        --color-accent: #00d4ff;
        --color-text: #ffffff;
        --color-text-secondary: #8892a4;
        --color-low: #22c55e;
        --color-medium: #f59e0b;
        --color-high: #ef4444;
        --color-critical: #7c3aed;
        --font-system: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, Oxygen, Ubuntu, sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-system);
        -webkit-font-smoothing: antialiased;
      }

      /* The single mount point — map fills this, overlays are positioned inside */
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
